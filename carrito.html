<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | ELEGIDA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-pink-600">ELEGIDA</a>
      <a href="carrito.html" class="relative"> <span id="cart-badge" class="absolute -top-2 -right-2 bg-pink-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"></span></a>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8 max-w-4xl">
    <h1 class="text-3xl font-bold mb-6">Tu Carrito</h1>
    <div id="cart-content" class="space-y-4"></div>
    
    <!-- Resumen del carrito -->
    <div id="cart-summary" class="mt-8 bg-white p-6 rounded-lg shadow hidden">
      <div class="flex justify-between text-xl font-bold mb-4">
        <span>Total:</span>
        <span id="cart-total" class="text-pink-600">$0.00</span>
      </div>
      <a href="checkout.html" class="block w-full bg-pink-600 text-white text-center py-3 rounded-lg font-bold hover:bg-pink-700 transition">
        Proceder al Pago
      </a>
      <a href="catalogo.html" class="block w-full text-center text-pink-600 mt-4 hover:underline">
        ← Seguir comprando
      </a>
    </div>

    <!-- Carrito vacío -->
    <div id="empty-cart" class="text-center py-12 hidden">
      <p class="text-gray-500 text-lg mb-4">Tu carrito está vacío</p>
      <a href="catalogo.html" class="inline-block bg-pink-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-pink-700 transition">
        Ver Catálogo
      </a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cart.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const content = document.getElementById('cart-content');
      const summary = document.getElementById('cart-summary');
      const emptyCart = document.getElementById('empty-cart');

      if (cart.length === 0) {
        content.classList.add('hidden');
        summary.classList.add('hidden');
        emptyCart.classList.remove('hidden');
        return;
      }

      emptyCart.classList.add('hidden');
      summary.classList.remove('hidden');

      let total = 0;
      content.innerHTML = cart.map((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        return `
          <div class="bg-white p-4 rounded-lg shadow flex gap-4">
            <img src="${item.image}" alt="${item.name}" class="w-24 h-24 object-cover rounded">
            <div class="flex-1">
              <h3 class="font-semibold text-lg">${item.name}</h3>
              <p class="text-sm text-gray-500">Talla: ${item.size} | Color: ${item.color}</p>
              <p class="text-pink-600 font-bold mt-1">${formatPrice(item.price)}</p>
              <div class="flex items-center gap-2 mt-2">
                <button onclick="updateQuantity(${index}, ${item.qty - 1})" class="px-2 py-1 border rounded hover:bg-gray-100">-</button>
                <span class="px-3 py-1">${item.qty}</span>
                <button onclick="updateQuantity(${index}, ${item.qty + 1})" class="px-2 py-1 border rounded hover:bg-gray-100">+</button>
                <button onclick="removeItem(${index})" class="ml-auto text-red-500 hover:text-red-700">🗑️ Eliminar</button>
              </div>
            </div>
            <div class="text-right">
              <p class="font-bold text-lg">${formatPrice(itemTotal)}</p>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('cart-total').textContent = formatPrice(total);
    }

    window.updateQuantity = (index, qty) => {
      if (qty <= 0) {
        removeItem(index);
      } else {
        updateCartQty(index, qty);
        renderCart();
      }
    };

    window.removeItem = (index) => {
      updateCartQty(index, 0);
      renderCart();
    };

    document.addEventListener('DOMContentLoaded', () => {
      updateCartBadge();
      renderCart();
    });
  </script>
</body>
</html>
